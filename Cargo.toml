[package]
name = "cargo-upgrade"
version = "0.0.2"
description = "upgrades all dependencies in Cargo.toml manifests"
readme = "README.md"
homepage = "https://crates.io/crates/cargo-upgrade"
license = "MIT"
edition = "2024"
autoexamples = false
autobenches = false

[lib]
name = "cargo_upgrade"
path = "src/lib.rs"
bench = false

[[bin]]
name = "cargo-upgrade"
path = "src/main.rs"

[dependencies]
#cargo = "0.89.0"
clap = { version = "4.6.1", features = ["derive", "env", "string", "unicode", "wrap_help"] }
crates-io = "0.40.19"
curl = "0.4.50"
dumbeq = "0.1.2"
indicatif = "0.18.5"
iocore = "3.1.0"
serde = { version = "1.0.228", features = ["derive"] }
toml = "1.1.2+spec-1.1.0"
toml_edit = { version = "0.23.9", features = ["serde"] }
url = "2.5.8"
